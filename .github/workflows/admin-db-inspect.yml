name: Admin DB Inspect

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/admin-db-inspect.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Query admin users from production database
        env:
          DEPLOY_PATH: /opt/ChatGPT-Mirror
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
        run: |
          set -e
          mkdir -p .tmp
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$DEPLOY_PORT" "$DEPLOY_USERNAME@$DEPLOY_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'SH' > .tmp/admin-db-inspect.json
          set -e
          export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
          cd "$DEPLOY_PATH"
          docker compose exec -T web sh -lc 'cd /app/backend && DJANGO_SETTINGS_MODULE=app.settings python - <<'"'"'PY'"'"'
          import json

          import django

          django.setup()

          from app.accounts.models import User


          def password_algorithm(raw_hash: str) -> str:
              if not raw_hash:
                  return ""
              return str(raw_hash).split("$", 1)[0]


          payload = {
              "superuser_count": 0,
              "superusers": [],
          }

          queryset = User.objects.filter(is_superuser=True).order_by("id")
          payload["superuser_count"] = queryset.count()
          for user in queryset:
              payload["superusers"].append(
                  {
                      "id": user.id,
                      "username": user.username,
                      "email": user.email,
                      "is_active": user.is_active,
                      "status": getattr(user, "status", ""),
                      "password_algorithm": password_algorithm(user.password),
                      "matches_default_password_dairoot": user.check_password("dairoot"),
                  }
              )

          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY'
          SH
          cat .tmp/admin-db-inspect.json

      - name: Commit sanitized inspection output
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .tmp/admin-db-inspect.json
          git commit -m "chore: record admin db inspection output" || exit 0
          git push
