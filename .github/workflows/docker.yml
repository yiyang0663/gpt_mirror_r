name: Docker

on:
  push:
    tags:
      - "*"

concurrency:
  group: docker-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DEPLOY_PATH: /opt/ChatGPT-Mirror
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate release tag format
        run: |
          set -e
          if [[ ! "$RELEASE_TAG" =~ ^[0-9]{8}\.[0-9]+$ ]]; then
            echo "Invalid tag: $RELEASE_TAG"
            echo "Expected format: YYYYMMDD.N, for example 20260404.1"
            exit 1
          fi

  docker:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs:
      - validate
      - docker
    runs-on: ubuntu-latest

    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          set -e
          test -n "$DEPLOY_HOST" || { echo "Missing DEPLOY_HOST secret"; exit 1; }
          test -n "$DEPLOY_USERNAME" || { echo "Missing DEPLOY_USERNAME secret"; exit 1; }
          test -n "$DEPLOY_PASSWORD" || { echo "Missing DEPLOY_PASSWORD secret"; exit 1; }

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.5
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 30m
          envs: REPO_URL,DEPLOY_PATH,RELEASE_TAG,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              git clone --depth 1 "$REPO_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git remote set-url origin "$REPO_URL"
            git fetch origin --tags main
            git checkout --detach "$RELEASE_TAG"

            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$RELEASE_TAG/" .env
            else
              printf '\nIMAGE_TAG=%s\n' "$RELEASE_TAG" >> .env
            fi

            if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            docker compose pull web
            docker compose up -d web
            docker image prune -f
