name: DB Inspect

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/db-inspect.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Query latest usage and dispatch records
        env:
          DEPLOY_PATH: /opt/ChatGPT-Mirror
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
        run: |
          set -e
          mkdir -p .tmp
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$DEPLOY_PORT" "$DEPLOY_USERNAME@$DEPLOY_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'SH' > .tmp/db-inspect-output.json
          set -e
          export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
          cd "$DEPLOY_PATH"
          docker compose exec -T web sh -lc 'cd /app/backend && DJANGO_SETTINGS_MODULE=app.settings python - <<'"'"'PY'"'"'
          import json
          from datetime import datetime

          import django

          django.setup()

          from app.chatgpt.models import DispatcherDecisionLog, UsageLedger


          def mask(value):
              value = str(value or "")
              if not value:
                  return ""
              if len(value) <= 6:
                  return value[:1] + "***"
              return value[:3] + "***" + value[-3:]


          def format_usage(item):
              account = item.account
              user = item.user
              return {
                  "id": item.id,
                  "created_at": item.created_at,
                  "created_at_iso": datetime.fromtimestamp(item.created_at).isoformat(),
                  "status_code": item.status_code,
                  "error_code": item.error_code,
                  "model_name": item.model_name,
                  "request_type": item.request_type,
                  "username": mask(user.username if user else ""),
                  "account": mask(account.chatgpt_username if account else ""),
                  "source_type": getattr(account, "source_type", ""),
                  "account_type": getattr(account, "account_type", ""),
              }


          def format_dispatch(item):
              account = item.account
              user = item.user
              return {
                  "id": item.id,
                  "created_time": item.created_time,
                  "created_time_iso": datetime.fromtimestamp(item.created_time).isoformat(),
                  "entrypoint": item.entrypoint,
                  "channel": item.channel,
                  "model_name": item.model_name,
                  "decision_status": item.decision_status,
                  "reason": item.reason,
                  "requested_account_id": item.requested_account_id,
                  "candidate_count": len(item.candidate_account_ids or []),
                  "username": mask(user.username if user else ""),
                  "account": mask(account.chatgpt_username if account else ""),
                  "source_type": getattr(account, "source_type", ""),
                  "account_type": getattr(account, "account_type", ""),
              }


          payload = {
              "latest_usage": [
                  format_usage(item)
                  for item in UsageLedger.objects.select_related("user", "account").order_by("-id")[:10]
              ],
              "latest_failed_usage": [
                  format_usage(item)
                  for item in (
                      UsageLedger.objects.select_related("user", "account")
                      .filter(status_code__gte=400)
                      .order_by("-id")[:10]
                  )
              ],
              "latest_dispatch": [
                  format_dispatch(item)
                  for item in DispatcherDecisionLog.objects.select_related("user", "account").order_by("-id")[:10]
              ],
          }
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY'
          SH
          cat .tmp/db-inspect-output.json

      - name: Commit masked inspection output
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .tmp/db-inspect-output.json
          git commit -m "chore: record db inspection output" || exit 0
          git push
